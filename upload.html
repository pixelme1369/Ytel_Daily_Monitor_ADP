<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload Shared Data — Ytel Monitor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#0F172A;color:#1E293B;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:12px;padding:32px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
h1{font-size:18px;font-weight:700;margin-bottom:6px;color:#0F172A}
p.sub{font-size:13px;color:#64748B;margin-bottom:22px}
label{display:block;font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;margin-top:16px}
input[type=password],input[type=file]{width:100%;padding:10px 12px;border:1px solid #E2E8F0;border-radius:8px;font-size:14px;font-family:inherit}
button{width:100%;margin-top:22px;padding:12px;border:none;border-radius:8px;background:#6366F1;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
button:hover{background:#4F46E5}
button:disabled{background:#CBD5E1;cursor:not-allowed}
.msg{margin-top:16px;font-size:13px;padding:10px 12px;border-radius:8px;display:none}
.msg.ok{display:block;background:#D1FAE5;color:#065F46}
.msg.err{display:block;background:#FEE2E2;color:#7F1D1D}
</style>
</head>
<body>
<div class="card">
  <h1>Upload Shared Data</h1>
  <p class="sub">Upload today's merged Ytel + CRM XLSX file. Once uploaded, the dashboard will load it automatically for anyone who opens it — no password needed to view.</p>
  <form id="f">
    <label for="pw">Password</label>
    <input type="password" id="pw" autocomplete="current-password" required>
    <label for="file">XLSX File</label>
    <input type="file" id="file" accept=".xlsx,.xls" required>
    <button type="submit" id="btn">Upload</button>
  </form>
  <div class="msg" id="msg"></div>
</div>
<script>
function toBase64(buf){
  let binary='';
  const bytes=new Uint8Array(buf);
  const chunk=0x8000;
  for(let i=0;i<bytes.length;i+=chunk){
    binary+=String.fromCharCode.apply(null, bytes.subarray(i,i+chunk));
  }
  return btoa(binary);
}
document.getElementById('f').addEventListener('submit', function(e){
  e.preventDefault();
  const btn=document.getElementById('btn');
  const msg=document.getElementById('msg');
  msg.className='msg';
  const pw=document.getElementById('pw').value;
  const file=document.getElementById('file').files[0];
  if(!file){ return; }
  btn.disabled=true; btn.textContent='Uploading…';
  const reader=new FileReader();
  reader.onload=function(ev){
    const dataBase64=toBase64(ev.target.result);
    fetch('/api/upload', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw, dataBase64: dataBase64 })
    }).then(function(r){ return r.json().then(function(body){ return {status:r.status, body:body}; }); })
      .then(function(res){
        if(res.status===200){
          msg.textContent='Uploaded successfully — '+res.body.size.toLocaleString()+' bytes. The dashboard will pick it up automatically.';
          msg.className='msg ok';
          document.getElementById('f').reset();
        } else {
          msg.textContent='Error: '+(res.body.error||'Upload failed');
          msg.className='msg err';
        }
      })
      .catch(function(err){
        msg.textContent='Error: '+err.message;
        msg.className='msg err';
      })
      .finally(function(){
        btn.disabled=false; btn.textContent='Upload';
      });
  };
  reader.readAsArrayBuffer(file);
});
</script>
</body>
</html>
